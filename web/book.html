<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>Bookfinder — книга</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    (function () {
      var key = 'bookfinder_theme';
      var theme = localStorage.getItem(key);
      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=20260713a">
</head>
<body class="book-page">
  <header class="book-hero">
    <div class="book-hero-inner">
      <div class="book-hero-top">
        <a href="/" class="back-link" id="back-link">← Каталог</a>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Переключить тему">☀</button>
      </div>
      <h1 id="d-title" class="book-title">Загрузка…</h1>
      <p id="d-authors" class="book-authors"></p>
      <div id="d-actions" class="book-hero-actions"></div>
    </div>
  </header>

  <main class="book-main">
    <div class="book-grid">
      <section class="book-panel book-panel-wide" id="d-description-panel">
        <h2 class="panel-title">Аннотация</h2>
        <p id="d-description" class="book-description muted">Загрузка…</p>
      </section>

      <section class="book-panel book-panel-wide" id="d-overview-panel" hidden>
        <h2 class="panel-title">Обзор <span class="hint-tip th-hint" tabindex="0" data-tip="Краткий пересказ без спойлеров финала, собранный локальной моделью.">?</span></h2>
        <div id="d-overview" class="book-overview"></div>
      </section>

      <section class="book-panel">
        <h2 class="panel-title">Рейтинги <span class="hint-tip th-hint" tabindex="0" data-tip="Сводная оценка по внешним источникам и оценка читателей Bookfinder.">?</span></h2>
        <div id="d-rating" class="rating-grid"></div>
        <div id="d-user-rating" class="user-rating"></div>
      </section>

      <section class="book-panel">
        <h2 class="panel-title">Скачивание</h2>
        <div id="d-downloads" class="download-row"></div>
        <p id="d-sources" class="sources-row muted"></p>
      </section>

      <section class="book-panel">
        <h2 class="panel-title">Жанры</h2>
        <div id="d-genres" class="badge-row"></div>
        <p id="d-relevance" class="help-block"></p>
      </section>

      <section class="book-panel book-panel-wide" id="d-dna-panel" hidden>
        <div class="dna-panel-head">
          <h2 class="panel-title">ДНК книги <span class="hint-tip th-hint" tabindex="0" data-tip="Профиль ощущений и идей книги, построенный локальной моделью.">?</span></h2>
          <span id="d-dna-badge" class="dna-reader-badge" hidden></span>
        </div>
        <p id="d-dna-tagline" class="dna-tagline"></p>
        <p id="d-dna-summary" class="dna-summary muted"></p>
        <div id="d-dna-axes" class="dna-axes"></div>
        <div id="d-dna-themes" class="badge-row"></div>
        <div id="d-dna-reviews-summary" class="dna-reviews-summary"></div>
        <p class="dna-disclaimer muted">
          Профиль собран локальной моделью по аннотациям и отзывам. Ваши файлы на устройстве не читаются.
          <a href="/dna">Подробнее о ДНК</a>
        </p>
      </section>

      <section class="book-panel book-panel-wide">
        <h2 class="panel-title">Комментарии с сайтов</h2>
        <div id="d-reviews" class="reviews-block muted">Загрузка…</div>
      </section>

      <section class="book-panel book-panel-wide">
        <div class="similar-header">
          <h2 class="panel-title">Похожие книги</h2>
          <div id="similar-modes" class="similar-modes" hidden></div>
        </div>
        <ul id="similar" class="similar-list"></ul>
      </section>
    </div>
  </main>

  <script src="/static/common.js?v=20260713a"></script>
  <script src="/static/book.js?v=20260713a"></script>
</body>
</html>
