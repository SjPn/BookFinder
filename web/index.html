<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache">
  <meta name="theme-color" content="#0b1220">
  <title>Bookfinder</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      var key = 'bookfinder_theme';
      var theme = localStorage.getItem(key);
      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelector('meta[name="theme-color"]')?.setAttribute(
        'content',
        theme === 'light' ? '#e8eef5' : '#0b1220'
      );
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=20260713d">
</head>
<body class="catalog-page">
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-block">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">Bookfinder</span>
        </a>
        <p class="brand-tagline">Фантастика и фэнтези — рейтинги в одном месте</p>
      </div>
      <div class="header-actions">
        <div id="stats" class="stats-row" aria-live="polite"></div>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Переключить тему"></button>
      </div>
    </div>
  </header>

  <main class="catalog-layout">
    <div class="filters-backdrop" id="filters-backdrop" hidden></div>
    <aside class="filters-sidebar" id="filters-sidebar" aria-label="Фильтр жанров">
      <div class="panel panel-filters">
        <div class="panel-head">
          <h2 class="panel-title">Жанры</h2>
          <div class="panel-head-actions">
            <button type="button" id="clear-genres" class="btn-text">Сбросить</button>
            <button type="button" class="btn-icon filters-close" id="filters-close" aria-label="Закрыть фильтры">×</button>
          </div>
        </div>
        <label class="sr-only" for="genre-filter">Поиск жанра</label>
        <input id="genre-filter" class="input" type="search" placeholder="Найти жанр…" autocomplete="off">
        <div class="match-mode" role="group" aria-label="Режим фильтра жанров">
          <label class="chip-radio"><input type="radio" name="match" value="any" checked><span>любой</span></label>
          <label class="chip-radio"><input type="radio" name="match" value="all"><span>все</span></label>
        </div>
        <div id="genre-list" class="genre-list"></div>
      </div>
      <div id="filter-weights" class="panel filter-weights hidden"></div>
    </aside>

    <section class="results-section">
      <div class="search-hero">
        <label class="search-field" for="query">
          <span class="field-label">Поиск</span>
          <div class="search-input-wrap">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
              <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="query" class="input input-search" type="search" placeholder="Название, автор или жанр…" autocomplete="off" enterkeyhint="search">
          </div>
        </label>
        <div class="search-toolbar">
          <button type="button" class="btn-secondary filters-open-btn" id="filters-open">
            Жанры
            <span class="filters-count" id="filters-count" hidden></span>
          </button>
        </div>
        <div class="search-meta">
          <p id="result-meta" class="result-meta"></p>
          <p id="load-more-row" class="load-more-row hidden">
            <button type="button" id="load-more" class="btn-secondary">Показать ещё</button>
          </p>
        </div>
      </div>

      <div id="results-cards" class="results-cards" aria-live="polite"></div>

      <div class="table-shell">
        <div class="table-scroll">
          <table id="table" class="data-table">
            <thead>
              <tr>
                <th class="col-num">#</th>
                <th class="col-title">Название</th>
                <th class="col-author">Автор</th>
                <th class="col-rating">Рейтинг <span class="hint-tip th-hint" tabindex="0" data-tip="Сводная оценка 0–10 по внешним источникам">?</span></th>
                <th class="col-genres">Жанры</th>
                <th class="col-go" aria-label="Открыть"></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/common.js?v=20260713d"></script>
  <script src="/static/app.js?v=20260713d"></script>
</body>
</html>
