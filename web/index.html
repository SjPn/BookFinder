<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>Bookfinder</title>
  <link rel="stylesheet" href="/static/style.css?v=20260704b">
</head>
<body>
  <header>
    <h1>Bookfinder</h1>
    <p id="stats"></p>
  </header>
  <main>
    <aside>
      <div class="panel">
        <label class="field-label" for="genre-filter">Фильтр жанров</label>
        <input id="genre-filter" type="search" placeholder="Найти жанр…" autocomplete="off">
        <div class="match-mode">
          <label><input type="radio" name="match" value="any" checked> любой</label>
          <label><input type="radio" name="match" value="all"> все</label>
        </div>
        <div id="genre-list" class="genre-list"></div>
      </div>
      <div id="filter-weights" class="filter-weights hidden"></div>
    </aside>
    <section class="results">
      <div class="toolbar">
        <label class="search-field">
          <span>Поиск книг</span>
          <input id="query" type="search" placeholder="Название, автор, жанр…" autocomplete="off">
        </label>
        <p id="result-meta" class="result-meta"></p>
        <p id="load-more-row" class="load-more-row hidden">
          <button type="button" id="load-more" class="link">Показать ещё</button>
        </p>
        <p class="legend-hints muted">
          <span class="hint-tip" tabindex="0" data-tip="Сводная оценка 0–10 по FantLab, LiveLib, FW, Кубикус, BookMix и LoveRead (учитываются только источники с достаточным числом голосов).">Рейтинг</span>
          ·
          <span class="hint-tip" tabindex="0" data-tip="Насколько книга подходит под текст поиска и выбранные жанры: чем выше, тем ближе к запросу.">Релевантность</span>
          ·
          <span class="hint-tip" tabindex="0" data-tip="Средняя оценка читателей Bookfinder (1–10), которую ставят на странице книги.">Оценка портала</span>
        </p>
      </div>
      <table id="table">
        <thead>
          <tr>
            <th>#</th>
            <th>Название</th>
            <th>Автор</th>
            <th>Рейтинг <span class="hint-tip th-hint" tabindex="0" data-tip="Сводная оценка 0–10 по внешним источникам (FantLab, LiveLib, FW и др.)">?</span></th>
            <th>Портал <span class="hint-tip th-hint" tabindex="0" data-tip="Средняя оценка читателей Bookfinder на странице книги">?</span></th>
            <th>Релев. <span class="hint-tip th-hint" tabindex="0" data-tip="Близость к вашему поиску и фильтрам жанров (0–100)">?</span></th>
            <th>Источники</th>
            <th>Жанры</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <script src="/static/common.js?v=20260704b"></script>
  <script src="/static/app.js?v=20260704b"></script>
</body>
</html>
